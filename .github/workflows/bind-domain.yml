name: Bind custom domain

# Binds a custom domain (default live.kftpl.com) to the Container App with a
# free Azure-managed TLS certificate. Run it once to get the DNS records to
# add; after DNS propagates, run it again to complete the binding.

on:
  workflow_dispatch:
    inputs:
      hostname:
        description: Custom domain to bind
        required: true
        default: live.kftpl.com

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-container-app
  cancel-in-progress: false

env:
  RG: rg-internal-messaging
  APP: internal-messaging
  ENVIRONMENT: msg-env

jobs:
  bind:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bind hostname
        run: |
          az extension add --name containerapp --upgrade --only-show-errors
          HOSTNAME="${{ inputs.hostname }}"
          SUB="${HOSTNAME%%.*}"

          FQDN=$(az containerapp show -g "$RG" -n "$APP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          ASUID=$(az containerapp show -g "$RG" -n "$APP" \
            --query properties.customDomainVerificationId -o tsv)

          {
            echo "## DNS records for $HOSTNAME"
            echo ""
            echo "| Type | Name | Value |"
            echo "| --- | --- | --- |"
            echo "| CNAME | \`$SUB\` | \`$FQDN\` |"
            echo "| TXT | \`asuid.$SUB\` | \`$ASUID\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          echo "CNAME  $SUB  ->  $FQDN"
          echo "TXT    asuid.$SUB  ->  $ASUID"

          az containerapp hostname add -g "$RG" -n "$APP" \
            --hostname "$HOSTNAME" --only-show-errors || true

          if az containerapp hostname bind -g "$RG" -n "$APP" \
              --hostname "$HOSTNAME" --environment "$ENVIRONMENT" \
              --validation-method CNAME --only-show-errors; then
            echo "### ✅ Bound: https://$HOSTNAME (managed cert provisioning)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⏳ Not bound yet — add the DNS records above, wait for propagation, then re-run this workflow." >> "$GITHUB_STEP_SUMMARY"
            echo "DNS validation not ready yet; re-run after adding the records."
          fi
