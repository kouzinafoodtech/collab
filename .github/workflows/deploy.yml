name: Deploy to Azure Container Apps

# Builds the image on Azure (az acr build) and deploys to Azure Container Apps.
# Everything runs on GitHub-hosted runners + Azure — nothing on your machine.

on:
  push:
    branches:
      - main
  workflow_dispatch: # lets you trigger a deploy by hand from the Actions tab

permissions:
  id-token: write # required for Azure OIDC login (no stored password)
  contents: read

# Never let two deploys touch the Azure environment at once.
concurrency:
  group: deploy-container-app
  cancel-in-progress: false

env:
  RG: rg-internal-messaging
  LOCATION: centralindia
  ACR: kouzinamsgacr # must be globally unique; change if this name is taken
  APP: internal-messaging
  ENVIRONMENT: msg-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image on Azure Container Registry
        run: |
          az extension add --name containerapp --upgrade --only-show-errors
          az group create -n "$RG" -l "$LOCATION" --only-show-errors
          az acr create -g "$RG" -n "$ACR" --sku Basic --admin-enabled true --only-show-errors || true
          az acr build -r "$ACR" -t "internal-messaging:${{ github.sha }}" . --only-show-errors

      - name: Deploy to Container Apps
        run: |
          IMAGE="$ACR.azurecr.io/internal-messaging:${{ github.sha }}"
          ACR_USER=$(az acr credential show -n "$ACR" --query username -o tsv)
          ACR_PASS=$(az acr credential show -n "$ACR" --query 'passwords[0].value' -o tsv)

          az containerapp env create -g "$RG" -n "$ENVIRONMENT" -l "$LOCATION" --only-show-errors || true

          # Support two ways of providing the database connection:
          #  A) Discrete MYSQL_* secrets — the app assembles the URL itself, so
          #     the password needs no URL-encoding (preferred).
          #  B) A single DATABASE_URL secret — the password MUST be percent-
          #     encoded inside the URL (e.g. '@' -> '%40').
          # Whichever is set takes effect; only the secret part is stored as an
          # encrypted Container Apps secret.
          if [ -n "${{ secrets.MYSQL_PASSWORD }}" ]; then
            echo "Using discrete MYSQL_* secrets"
            SECRETS=( "mysql-password=${{ secrets.MYSQL_PASSWORD }}" )
            ENV_VARS=(
              "MYSQL_HOST=${{ secrets.MYSQL_HOST }}"
              "MYSQL_USER=${{ secrets.MYSQL_USER }}"
              "MYSQL_DB=${{ secrets.MYSQL_DB }}"
              "MYSQL_PASSWORD=secretref:mysql-password"
              "PORT=8000"
            )
          elif [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "Using DATABASE_URL secret"
            SECRETS=( "db-url=${{ secrets.DATABASE_URL }}" )
            ENV_VARS=( "DATABASE_URL=secretref:db-url" "PORT=8000" )
          else
            echo "::error::No database secret set. Provide either MYSQL_PASSWORD (+MYSQL_HOST/USER/DB) or DATABASE_URL."
            exit 1
          fi

          APP_EXISTS=false
          az containerapp show -g "$RG" -n "$APP" --only-show-errors >/dev/null 2>&1 && APP_EXISTS=true

          # APP_SECRET signs the login JWTs. Generate it once and keep it stable
          # across deploys so existing sessions stay valid; only create it if the
          # app doesn't already have one.
          HAS_APP_SECRET=""
          if [ "$APP_EXISTS" = true ]; then
            HAS_APP_SECRET=$(az containerapp secret list -g "$RG" -n "$APP" \
              --query "[?name=='app-secret'].name" -o tsv 2>/dev/null || true)
          fi
          if [ -z "$HAS_APP_SECRET" ]; then
            SECRETS+=( "app-secret=$(openssl rand -hex 32)" )
          fi
          ENV_VARS+=( "APP_SECRET=secretref:app-secret" )

          if [ "$APP_EXISTS" = true ]; then
            echo "Updating existing app..."
            az containerapp secret set -g "$RG" -n "$APP" \
              --secrets "${SECRETS[@]}" --only-show-errors
            az containerapp update -g "$RG" -n "$APP" \
              --image "$IMAGE" \
              --min-replicas 1 --max-replicas 2 \
              --set-env-vars "${ENV_VARS[@]}" --only-show-errors
          else
            echo "Creating app..."
            az containerapp create -g "$RG" -n "$APP" \
              --environment "$ENVIRONMENT" \
              --image "$IMAGE" \
              --registry-server "$ACR.azurecr.io" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --target-port 8000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 2 \
              --secrets "${SECRETS[@]}" \
              --env-vars "${ENV_VARS[@]}" --only-show-errors
          fi

          FQDN=$(az containerapp show -g "$RG" -n "$APP" --query properties.configuration.ingress.fqdn -o tsv)
          echo "### Deployed: https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
